services:
  api:
    image: ${HONCHO_IMAGE_NAME:-honcho-local}
    build:
      context: ../..
      dockerfile: config/containers/Dockerfile
      args:
        HONCHO_REPO_URL: ${HONCHO_REPO_URL:-https://github.com/plastic-labs/honcho.git}
        HONCHO_REF: ${HONCHO_REF:-latest-release}
        HONCHO_WRAPPER_FINGERPRINT: ${HONCHO_WRAPPER_FINGERPRINT:-}
    entrypoint:
      - /bin/sh
      - -lc
      - /app/.venv/bin/python scripts/provision_db.py && exec /app/.venv/bin/fastapi run --host 0.0.0.0 src/main.py
    depends_on:
      database:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped
    ports:
      - ${HONCHO_API_HOST_PORT:-8000}:8000
    environment:
      DB_CONNECTION_URI: postgresql+psycopg://postgres:postgres@database:5432/postgres
      CACHE_URL: redis://redis:6379/0?suppress=true
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
      AUTH_USE_AUTH: ${AUTH_USE_AUTH:-false}
      LLM_OPENAI_API_KEY: ${LLM_OPENAI_API_KEY:-}
      LLM_ANTHROPIC_API_KEY: ${LLM_ANTHROPIC_API_KEY:-}
      LLM_GEMINI_API_KEY: ${LLM_GEMINI_API_KEY:-}
      LLM_GROQ_API_KEY: ${LLM_GROQ_API_KEY:-}
      SENTRY_ENABLED: ${SENTRY_ENABLED:-false}
      METRICS_ENABLED: ${METRICS_ENABLED:-false}
    healthcheck:
      test:
        - CMD-SHELL
        - python -c "import urllib.request; urllib.request.urlopen('http://localhost:8000/openapi.json')"
      interval: 10s
      timeout: 10s
      retries: 10

  deriver:
    image: ${HONCHO_IMAGE_NAME:-honcho-local}
    build:
      context: ../..
      dockerfile: config/containers/Dockerfile
      args:
        HONCHO_REPO_URL: ${HONCHO_REPO_URL:-https://github.com/plastic-labs/honcho.git}
        HONCHO_REF: ${HONCHO_REF:-latest-release}
        HONCHO_WRAPPER_FINGERPRINT: ${HONCHO_WRAPPER_FINGERPRINT:-}
    entrypoint:
      - /app/.venv/bin/python
      - -m
      - src.deriver
    depends_on:
      database:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped
    environment:
      DB_CONNECTION_URI: postgresql+psycopg://postgres:postgres@database:5432/postgres
      CACHE_URL: redis://redis:6379/0?suppress=true
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
      AUTH_USE_AUTH: ${AUTH_USE_AUTH:-false}
      LLM_OPENAI_API_KEY: ${LLM_OPENAI_API_KEY:-}
      LLM_ANTHROPIC_API_KEY: ${LLM_ANTHROPIC_API_KEY:-}
      LLM_GEMINI_API_KEY: ${LLM_GEMINI_API_KEY:-}
      LLM_GROQ_API_KEY: ${LLM_GROQ_API_KEY:-}
      SENTRY_ENABLED: ${SENTRY_ENABLED:-false}
      METRICS_ENABLED: ${METRICS_ENABLED:-false}

  database:
    image: pgvector/pgvector:pg15
    restart: unless-stopped
    command:
      - postgres
      - -c
      - max_connections=800
    environment:
      POSTGRES_DB: postgres
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_HOST_AUTH_METHOD: trust
      PGDATA: /var/lib/postgresql/data/pgdata
    volumes:
      - ./database/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
      - ${DATA_POSTGRES_DIR:-/tmp/honcho-workspace/postgres-data}:/var/lib/postgresql/data/
    healthcheck:
      test:
        - CMD-SHELL
        - pg_isready -U postgres -d postgres
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:8.2
    restart: unless-stopped
    volumes:
      - ${DATA_REDIS_DIR:-/tmp/honcho-workspace/redis-data}:/data
    healthcheck:
      test:
        - CMD-SHELL
        - redis-cli ping
      interval: 5s
      timeout: 5s
      retries: 10
